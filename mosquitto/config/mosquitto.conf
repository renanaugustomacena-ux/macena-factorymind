# ============================================================================
# FactoryMind Mosquitto broker configuration.
# For a production deployment you MUST:
#   - disable allow_anonymous
#   - provision a passwd file (mosquitto_passwd -c /mosquitto/config/passwd user)
#   - enable TLS (listener 8883) with a real cert chain and client-cert auth
#   - migrate to a clustered broker (EMQX / HiveMQ / VerneMQ) once you exceed
#     ~50k concurrent publishers; Mosquitto scales well into the thousands but
#     is single-node.
# ============================================================================

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all
log_timestamp true
connection_messages true

# MQTT over TCP — on-premise PLC gateways, Node backend, simulator (dev-only).
# Production deployments (Tier 4 SaaS, Tier 3 Enterprise) MUST set the firewall
# to expose only 8883 (TLS) externally; 1883 stays accessible inside the
# `factorymind-net` Docker network for legacy clients.
listener 1883 0.0.0.0
protocol mqtt

# R-MQTT-TLS-001 (F-CRIT-002): TLS listener on 8883.
# Certs generated by install.sh:
#   /mosquitto/certs/ca.crt     — dev CA (replace with real CA in prod)
#   /mosquitto/certs/server.crt — leaf cert, SAN: factorymind-mosquitto, localhost
#   /mosquitto/certs/server.key — leaf key (mode 600)
# `require_certificate false` keeps password-auth as the primary client
# identity mechanism; mTLS for edge gateways is a follow-up (R-MQTT-MTLS-001).
listener 8883 0.0.0.0
protocol mqtt
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2

# MQTT over WebSocket — browsers (frontend), mobile clients
listener 9001 0.0.0.0
protocol websockets

# R-MQTT-ANON-001 (F-CRIT-001): authentication is mandatory.
# install.sh provisions /mosquitto/config/passwd before `docker compose up`.
# acl is per-user (see /mosquitto/config/acl) and denies anonymous publish.
allow_anonymous false
password_file   /mosquitto/config/passwd
acl_file        /mosquitto/config/acl

# Broker tuning — industrial topics fan out wide, so raise limits from defaults.
max_connections -1
max_queued_messages 10000
message_size_limit 262144
max_inflight_messages 40
max_keepalive 120
persistent_client_expiration 2h
queue_qos0_messages false
retain_available true
set_tcp_nodelay true

# Bridge configuration placeholder — when you deploy FactoryMind at an edge
# gateway, uncomment a block similar to the following to bridge the on-prem
# broker to a central cloud broker.
#
# connection cloud-bridge
# address cloud-broker.factorymind.example:8883
# bridge_cafile /mosquitto/certs/ca.crt
# bridge_certfile /mosquitto/certs/client.crt
# bridge_keyfile /mosquitto/certs/client.key
# topic factory/# out 1
# topic factory/+/+/+/commands in 2
# cleansession false
# start_type automatic
# notifications true
