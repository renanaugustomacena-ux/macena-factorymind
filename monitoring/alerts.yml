# ============================================================================
# FactoryMind — Prometheus alert rules.
#
# Bundled with Alertmanager routing (monitoring/alertmanager.yml). These rules
# defend the SLOs defined in docs/SLO.md. Every alert carries the SLO it
# backs + a runbook URL.
# ============================================================================
groups:
  - name: factorymind.availability
    rules:
      - alert: FactoryMindAPIDown
        expr: up{job="factorymind-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: factorymind-backend
          slo: SLO-1
        annotations:
          summary: "FactoryMind API unreachable"
          description: "Backend has not responded to Prometheus scrape for 2 minutes."
          runbook: "https://runbooks.factorymind.example/FactoryMindAPIDown.md"

      - alert: FactoryMindReadinessFlap
        expr: changes(probe_success{job="factorymind-ready"}[15m]) > 6
        for: 5m
        labels:
          severity: warning
          service: factorymind-backend
          slo: SLO-1
        annotations:
          summary: "Readiness probe flapping"
          description: "/api/ready transitioned ready<->not-ready more than 3 times in 15 minutes."
          runbook: "https://runbooks.factorymind.example/FactoryMindReadinessFlap.md"

  - name: factorymind.errors
    rules:
      - alert: FactoryMindHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="factorymind-backend",status=~"5.."}[10m]))
            /
            sum(rate(http_requests_total{job="factorymind-backend"}[10m]))
          ) > 0.01
        for: 5m
        labels:
          severity: critical
          service: factorymind-backend
          slo: SLO-1
        annotations:
          summary: "5xx error rate exceeds 1%"
          description: "Backend 5xx ratio {{ $value | humanizePercentage }} over 10m window."
          runbook: "https://runbooks.factorymind.example/FactoryMindHighErrorRate.md"

      - alert: FactoryMindAlertEngineErrors
        expr: sum(rate(factorymind_alert_engine_errors_total[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: factorymind-alert-engine
        annotations:
          summary: "Alert engine error rate elevated"
          description: "Alert-engine errors ({{ $value }} per second) — rule evaluation may be failing."
          runbook: "https://runbooks.factorymind.example/FactoryMindAlertEngineErrors.md"

  - name: factorymind.latency
    rules:
      - alert: FactoryMindLatencyBurn
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="factorymind-backend"}[5m])) by (le)
          ) > 0.5
        for: 15m
        labels:
          severity: warning
          service: factorymind-backend
          slo: SLO-2
        annotations:
          summary: "HTTP P95 latency > 500 ms"
          description: "P95 latency {{ $value }}s sustained for 15 minutes. SLO target 300 ms."
          runbook: "https://runbooks.factorymind.example/FactoryMindLatencyBurn.md"

      - alert: FactoryMindLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="factorymind-backend"}[5m])) by (le)
          ) > 1.5
        for: 30m
        labels:
          severity: warning
          service: factorymind-backend
          slo: SLO-3
        annotations:
          summary: "HTTP P99 latency > 1.5 s"

  - name: factorymind.resources
    rules:
      - alert: FactoryMindHeapPressure
        expr: |
          nodejs_heap_used_bytes{job="factorymind-backend"}
          /
          nodejs_heap_total_bytes{job="factorymind-backend"} > 0.8
        for: 10m
        labels:
          severity: warning
          service: factorymind-backend
        annotations:
          summary: "Node heap > 80%"
          runbook: "https://runbooks.factorymind.example/FactoryMindHeapPressure.md"

      - alert: FactoryMindEventLoopLag
        expr: nodejs_eventloop_lag_p99_seconds{job="factorymind-backend"} > 0.1
        for: 10m
        labels:
          severity: warning
          service: factorymind-backend
        annotations:
          summary: "Event-loop lag P99 > 100 ms"

      - alert: FactoryMindCPUSaturation
        expr: |
          rate(process_cpu_seconds_total{job="factorymind-backend"}[5m]) > 0.8
        for: 15m
        labels:
          severity: warning
          service: factorymind-backend
        annotations:
          summary: "Backend CPU saturation > 80%"

  - name: factorymind.dependencies
    rules:
      - alert: FactoryMindMQTTDisconnected
        expr: factorymind_mqtt_connected{job="factorymind-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: factorymind-backend
        annotations:
          summary: "FactoryMind backend is disconnected from Mosquitto"

      - alert: FactoryMindInfluxWriteFailures
        expr: |
          rate(factorymind_influx_write_failures_total[10m])
          /
          rate(factorymind_influx_write_attempts_total[10m]) > 0.001
        for: 10m
        labels:
          severity: warning
          service: factorymind-backend
          slo: SLO-7
        annotations:
          summary: "Influx write-failure ratio > 0.1%"

      - alert: FactoryMindPostgresDown
        expr: pg_up{datname="factorymind"} == 0
        for: 2m
        labels:
          severity: critical
          service: factorymind-postgres
        annotations:
          summary: "Postgres DB unreachable from backend"

  - name: factorymind.security
    rules:
      - alert: FactoryMindLoginAnomalies
        expr: |
          sum(rate(factorymind_login_failures_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: factorymind-backend
        annotations:
          summary: "Elevated login-failure rate"
          description: "More than 10 failed logins/s for 5 minutes — possible credential stuffing."
