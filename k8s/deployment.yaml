# ============================================================================
# FactoryMind backend Deployment.
#
# Notes:
#   - Readiness probe (HTTP GET /api/ready) gates traffic only once all
#     dependencies (Postgres, Mosquitto, Influx) are reachable.
#   - Liveness probe (HTTP GET /api/health) detects hard hangs.
#   - Image is digest-pinned in CD pipeline (placeholder tag below).
#   - securityContext enforces non-root, no privilege escalation, read-only
#     root filesystem, drop all capabilities.
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: factorymind-backend
  namespace: factorymind
  labels:
    app.kubernetes.io/name: factorymind
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: factorymind
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factorymind
        app.kubernetes.io/component: backend
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: factorymind-backend
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: backend
      containers:
        - name: backend
          # Image digest is injected by CD pipeline post-Cosign sign.
          # Example: ghcr.io/factorymind/factorymind-backend@sha256:...
          image: ghcr.io/factorymind/factorymind-backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: factorymind-config
            - secretRef:
                name: factorymind-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
              ephemeral-storage: "500Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
        - name: cache
          emptyDir:
            sizeLimit: 50Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: factorymind-backend
  namespace: factorymind
  labels:
    app.kubernetes.io/name: factorymind
    app.kubernetes.io/component: backend
automountServiceAccountToken: false
