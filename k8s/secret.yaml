# ============================================================================
# FactoryMind sensitive configuration.
#
# This file is a TEMPLATE — do NOT commit real secrets. The recommended
# production flow is:
#
#   1. Populate AWS Secrets Manager (or equivalent) with the canonical values.
#   2. Deploy external-secrets.io ClusterSecretStore pointing at it.
#   3. Create an ExternalSecret resource that renders this Secret schema.
#
# The template shape below documents the exact keys the backend expects.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: factorymind-secrets
  namespace: factorymind
  labels:
    app.kubernetes.io/name: factorymind
    app.kubernetes.io/component: backend
  annotations:
    # Instruct external-secrets to take ownership of .data fields.
    managed-by: external-secrets
type: Opaque
stringData:
  # Connection string format: postgresql://user:pass@host:5432/db
  DATABASE_URL: "REPLACE_ME_postgresql_connection_string"
  # InfluxDB 2.x admin token (minimum 16 chars)
  INFLUX_TOKEN: "REPLACE_ME_influx_admin_token"
  # JWT signing secret (minimum 32 chars, >= 256 bits entropy recommended)
  JWT_SECRET: "REPLACE_ME_32_character_minimum_secret"
  JWT_REFRESH_SECRET: "REPLACE_ME_second_distinct_32_char_secret"
  # Mosquitto credentials (per-tenant; see mosquitto/config/passwd)
  MQTT_USERNAME: "REPLACE_ME_mqtt_user"
  MQTT_PASSWORD: "REPLACE_ME_mqtt_pw"
  # SMTP for alert escalation
  ALERT_SMTP_HOST: "REPLACE_ME_smtp_host"
  ALERT_SMTP_USER: "REPLACE_ME_smtp_user"
  ALERT_SMTP_PASSWORD: "REPLACE_ME_smtp_pw"
  ALERT_SMTP_FROM: "alerts@factorymind.example"
---
