# ============================================================================
# FactoryMind backend non-sensitive configuration.
#
# Sensitive values (DB password, Influx token, JWT secret, Mosquitto pw)
# live in the companion Secret (k8s/secret.yaml). Rotate via external
# secrets controller (e.g. ExternalSecrets / Vault / AWS Secrets Manager).
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: factorymind-config
  namespace: factorymind
  labels:
    app.kubernetes.io/name: factorymind
    app.kubernetes.io/component: backend
data:
  APP_ENV: "production"
  APP_PORT: "3002"
  LOG_LEVEL: "info"
  # --- External service endpoints (in-cluster DNS names) ---
  INFLUX_URL: "http://factorymind-influxdb.factorymind.svc.cluster.local:8086"
  INFLUX_ORG: "factorymind"
  INFLUX_BUCKET: "factory-telemetry"
  MQTT_BROKER_URL: "mqtt://factorymind-mosquitto.factorymind.svc.cluster.local:1883"
  # --- CORS / security ---
  CORS_ALLOWED_ORIGINS: "https://factorymind.example"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TTL: "15m"
  JWT_REFRESH_TTL: "12h"
  # --- Rate limit ---
  API_RATE_LIMIT_WINDOW_MS: "60000"
  API_RATE_LIMIT_MAX: "60"
  # --- Retention ---
  INFLUX_RETENTION_DAYS_RAW: "30"
  INFLUX_RETENTION_DAYS_1M: "365"
  INFLUX_RETENTION_DAYS_1H: "1095"
  # --- OTEL ---
  OTEL_SERVICE_NAME: "factorymind-backend"
  OTEL_SERVICE_VERSION: "1.0.0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.10"
  # --- Alert engine ---
  ALERT_EVAL_INTERVAL_MS: "5000"
  ALERT_ESCALATION_INTERVAL_MS: "300000"
  # --- Feature flags ---
  SPARKPLUG_ENABLED: "false"
  OPCUA_ENABLED: "false"
  MODBUS_ENABLED: "false"
  # --- Session / security ---
  SESSION_IDLE_TIMEOUT_MIN: "15"
  SESSION_ABSOLUTE_TIMEOUT_HR: "12"
  ACCOUNT_LOCKOUT_THRESHOLD: "5"
  ACCOUNT_LOCKOUT_WINDOW_SEC: "900"
  PASSWORD_MIN_LENGTH: "12"
