apiVersion: 1

providers:
  - name: FactoryMind
    orgId: 1
    folder: FactoryMind
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
