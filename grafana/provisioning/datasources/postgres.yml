apiVersion: 1

datasources:
  - name: FactoryMind-PostgreSQL
    type: postgres
    access: proxy
    uid: fm-postgres
    url: factorymind-postgres:5432
    user: ${POSTGRES_USER}
    database: ${POSTGRES_DB}
    editable: false
    jsonData:
      # R-GRAFANA-PG-TLS-001 (F-CRIT-005): force TLS on the Postgres link.
      # `require` validates the encryption layer without verifying the
      # server identity (acceptable in-cluster); `verify-ca` adds chain
      # validation against the CA mounted at /etc/grafana/certs/ca.crt
      # (recommended for cross-zone deployments).
      sslmode: require
      postgresVersion: 1600
      timescaledb: false
      maxOpenConns: 25
      maxIdleConns: 25
      connMaxLifetime: 14400
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
