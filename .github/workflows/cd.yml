name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/factorymind-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/factorymind-frontend
  IMAGE_SIMULATOR: ghcr.io/${{ github.repository_owner }}/factorymind-simulator

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        id: build_backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Build & push frontend
        id: build_frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Build & push simulator
        id: build_simulator
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./iot-simulator
          push: true
          tags: |
            ${{ env.IMAGE_SIMULATOR }}:${{ github.sha }}
            ${{ env.IMAGE_SIMULATOR }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # R-SUPPLY-001 / F-HIGH-009 — Cosign keyless OIDC signature on
      # every image. Uses GitHub-issued OIDC token (`id-token: write`
      # already in the job permissions); the signature lands in the
      # public Sigstore Rekor transparency log so a third-party
      # admission controller (R-K8S-KYVERNO-001 in W2) can verify
      # provenance against `subject` claims tied to this repo + ref.
      - name: Install Cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
        with:
          cosign-release: v2.4.1

      - name: Cosign sign images (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for img in \
            "${IMAGE_BACKEND}@${{ steps.build_backend.outputs.digest }}" \
            "${IMAGE_FRONTEND}@${{ steps.build_frontend.outputs.digest }}" \
            "${IMAGE_SIMULATOR}@${{ steps.build_simulator.outputs.digest }}"; do
            echo "Signing $img"
            cosign sign --yes "$img"
          done

      # R-K8S-DIGEST-001 / F-HIGH-008 — emit a digest manifest the
      # deploy jobs render against k8s/deployment.yaml via envsubst /
      # kustomize image transformer. Tag-only references (`:1.0.0`)
      # in the manifest are placeholders the CD pipeline rewrites
      # to `image@sha256:<digest>` before kubectl apply.
      - name: Emit image-digest manifest
        run: |
          mkdir -p artifacts
          cat > artifacts/image-digests.env <<EOF
          IMAGE_BACKEND_DIGEST=${IMAGE_BACKEND}@${{ steps.build_backend.outputs.digest }}
          IMAGE_FRONTEND_DIGEST=${IMAGE_FRONTEND}@${{ steps.build_frontend.outputs.digest }}
          IMAGE_SIMULATOR_DIGEST=${IMAGE_SIMULATOR}@${{ steps.build_simulator.outputs.digest }}
          EOF
          cat artifacts/image-digests.env

      - name: SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_BACKEND }}@${{ steps.build_backend.outputs.digest }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sboms-and-digests
          path: |
            *.spdx.json
            artifacts/image-digests.env

  deploy-staging:
    name: Deploy · staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download digest manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sboms-and-digests
          path: artifacts/

      - name: Render k8s manifests with image digests (R-K8S-DIGEST-001)
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source artifacts/image-digests.env
          export IMAGE_BACKEND_DIGEST IMAGE_FRONTEND_DIGEST IMAGE_SIMULATOR_DIGEST
          mkdir -p rendered
          # Replace tag-form image refs with @sha256:digest form before kubectl apply.
          sed \
            -e "s#image: ghcr.io/factorymind/factorymind-backend:[^[:space:]]*#image: ${IMAGE_BACKEND_DIGEST}#g" \
            -e "s#image: ghcr.io/factorymind/factorymind-frontend:[^[:space:]]*#image: ${IMAGE_FRONTEND_DIGEST}#g" \
            -e "s#image: ghcr.io/factorymind/factorymind-simulator:[^[:space:]]*#image: ${IMAGE_SIMULATOR_DIGEST}#g" \
            k8s/deployment.yaml > rendered/deployment.yaml
          # Sanity check: every image reference must now be digest-pinned.
          if grep -E '^\s*image:\s+\S+:\S+$' rendered/deployment.yaml | grep -v '@sha256:'; then
            echo "Tag-form image references survived rewrite — aborting." >&2
            exit 1
          fi
          echo "Rendered manifests:"
          grep -E '^\s*image:' rendered/deployment.yaml

      - name: Deploy placeholder
        run: |
          echo "Rolling deployment to staging:"
          echo "  kubectl apply -f rendered/deployment.yaml"
          echo "  kubectl rollout status deployment/factorymind-backend -n factorymind --timeout=180s"

  smoke-test:
    name: Staging smoke test
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Health probe placeholder
        run: echo "curl -fsS https://staging.factorymind.example/api/health"

  deploy-production:
    name: Deploy · production
    runs-on: ubuntu-latest
    needs: smoke-test
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Deploy placeholder (blue-green)
        run: echo "Swap blue/green target groups once new task set passes health checks."

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - run: echo "Slack / email notification placeholder."
