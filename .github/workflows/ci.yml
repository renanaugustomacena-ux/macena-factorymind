name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ======================================================================
  # Backend (Node.js + Express + MQTT + InfluxDB)
  # ======================================================================
  backend-lint:
    name: Backend · ESLint
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint

  backend-test:
    name: Backend · Jest
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci || npm install
      - run: npm run test:cov
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage

  backend-docker:
    name: Backend · Docker build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          push: false
          tags: |
            factorymind-backend:${{ github.sha }}
            factorymind-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ======================================================================
  # Frontend (React + Vite + TypeScript)
  # ======================================================================
  frontend-lint:
    name: Frontend · ESLint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm run typecheck

  frontend-build:
    name: Frontend · Vite build
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ======================================================================
  # Simulator
  # ======================================================================
  simulator-check:
    name: Simulator · smoke
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: iot-simulator }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --no-audit --no-fund
      - run: node simulator.js --help

  # ======================================================================
  # Security
  # ======================================================================
  security:
    name: Security · audit + Trivy + gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "20" }

      # R-CI-AUDIT-001 (F-CRIT-007): security gates are blocking — no
      # `|| true` masking, Trivy exits non-zero on HIGH/CRITICAL, Gitleaks
      # exit code is honoured. Doctrine R-3 forbids re-introducing masks.
      - name: npm audit (backend)
        working-directory: backend
        run: npm audit --production --audit-level=high

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --production --audit-level=high

      # R-NPM-PROVENANCE-001 (supply-chain hardening). `npm audit signatures`
      # verifies that every published package in the lockfile has a valid
      # ECDSA signature recorded in the npm Sigstore log; fails on missing or
      # tampered signatures. Re-run after every dependency change. The flag
      # `--workspaces=false --include=dev` keeps the check scoped to the
      # current package-lock and includes devDependencies (which are part of
      # the trusted build chain). Allow-listing for unsigned packages would
      # go via project-level npm config (`signature-overrides`); none today.
      - name: npm audit signatures (backend)
        working-directory: backend
        run: npm audit signatures --workspaces=false --include=dev

      - name: npm audit signatures (frontend)
        working-directory: frontend
        run: npm audit signatures --workspaces=false --include=dev

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ======================================================================
  # Terraform plan (best-effort; no cloud creds on PR)
  # ======================================================================
  terraform-validate:
    name: Terraform · fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: terraform }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with: { terraform_version: "1.9.8" }
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
